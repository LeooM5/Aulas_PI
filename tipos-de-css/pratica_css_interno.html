<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula CSS - 1</title>
    <style>
      .container {
        width: 500px;
        height: fit-content;
        padding: 2em;
        background-color: aliceblue;
        border-radius: 25px;
        border: solid 2px purple;
        margin: 20px;
      }

      span {
        color: navy;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div
        style="
          width: 100px;
          height: 100px;
          border-radius: 50;
          margin-bottom: 2em;
        "
      >
        <img
          style="width: 100%; height: 100%; margin-top: 20px"
          src="https://cdn-icons-png.flaticon.com/512/706/706830.png"
          alt=""
        />
      </div>

      <div>
        <h1 style="font-family: monospace; font-size: 30px">
          Meu nome é: <span>Adriana</span>
        </h1>

        <p style="font-family: monospace; font-size: 15px">
          Mensagem: <span>A vida não é um morango!</span>
        </p>
      </div>
    </div>

    <div
      style="
        width: 500px;
        padding: 2em;
        height: fit-content;
        background-color: aliceblue;
        border-radius: 25px;
        border: solid 8px green;
        margin: 20px;
      "
    >
      <div style="width: 100px; height: 100px; border-radius: 25px">
        <img
          style="width: 100%; height: 100%; margin-top: 20px"
          src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png"
          alt=""
        />
      </div>

      <div>
        <h1 style="font-family: monospace; font-size: 30px">
          Meu nome é: Hugo
        </h1>

        <p style="font-family: monospace; font-size: 15px">
          Mensagem: Um dia é da caça, o outro é do caçador.
        </p>
      </div>
    </div>
  </body>
</html>
